{% extends "base.html" %}
{% block title %}Login - Wedding Management{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <h2 class="text-muted">💒 Wedding Management</h2>
                <p class="text-muted">Admin</p>
                <a href="{{ url_for('index') }}" class="small text-muted">← Back to home</a>
            </div>

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required
                           placeholder="admin@example.com" value="{{ request.form.email or '' }}">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-gold w-100">Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
