{% extends "base.html" %}
{% block title %}Vendor Registration{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-6">
        <div class="card p-4">
            <h4>Vendor Registration</h4>
            <p class="text-muted small">Register your business to add services. Admin will approve your account.</p>
            <form method="POST" action="{{ url_for('vendor.register') }}">
                <div class="row g-2">
                    <div class="col-md-6">
                        <label class="form-label">Your Name *</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Password *</label>
                        <input type="password" class="form-control" name="password" required minlength="6">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Business Name *</label>
                        <input type="text" class="form-control" name="business_name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Service Type *</label>
                        <input type="text" class="form-control" name="service_type" placeholder="e.g. Photography, Catering" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Contact Email *</label>
                        <input type="email" class="form-control" name="contact_email" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Contact Phone</label>
                        <input type="text" class="form-control" name="contact_phone">
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-gold">Register</button>
                        <a href="{{ url_for('vendor.login') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
