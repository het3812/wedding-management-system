{% extends "base.html" %}
{% block title %}Host Registration{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-5">
        <div class="card p-4">
            <h4>Create Host Account</h4>
            <p class="text-muted small">Register as a wedding host to create invitations, manage guests, and events. No approval needed — start right away.</p>
            <form method="POST" action="{{ url_for('host.register') }}">
                <div class="mb-3">
                    <label class="form-label">Your Name *</label>
                    <input type="text" class="form-control" name="name" required
                           placeholder="e.g. Priya & Raj" value="{{ request.form.name or '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" class="form-control" name="email" required
                           placeholder="you@example.com" value="{{ request.form.email or '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password * (min 6 characters)</label>
                    <input type="password" class="form-control" name="password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-gold w-100">Create Account</button>
                <a href="{{ url_for('host.login') }}" class="btn btn-outline-secondary w-100 mt-2">Already have an account? Login</a>
                <a href="{{ url_for('index') }}" class="d-block text-center small text-muted mt-2">← Back to home</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
