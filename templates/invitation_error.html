<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="card p-5 text-center" style="max-width: 400px;">
        <h4 class="text-muted mb-3">Invalid Invitation</h4>
        <p class="text-secondary">{{ message }}</p>
        <p class="small text-muted">Please check the link or contact the host for a valid invitation.</p>
    </div>
</body>
</html>
